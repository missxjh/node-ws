<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>天气预报</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
        }
        .current {
            text-align: center;
            margin-bottom: 30px;
        }
        .temp {
            font-size: 48px;
            color: #ff5722;
        }
        .desc {
            font-size: 20px;
            color: #666;
        }
        .forecast {
            display: flex;
            justify-content: space-between;
        }
        .day {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-right: 1px solid #eee;
        }
        .day:last-child {
            border-right: none;
        }
        .date {
            font-weight: bold;
        }
        .weather-icon {
            font-size: 30px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌤️ 天气预报</h1>

    <!-- 当前天气 -->
    <div class="current">
        <div class="temp">25°C</div>
        <div class="desc">晴 / 微风</div>
        <div>城市：东京</div>
    </div>

    <!-- 未来天气 -->
    <div class="forecast">
        <div class="day">
            <div class="date">周一</div>
            <div class="weather-icon">☀️</div>
            <div>26°C / 18°C</div>
        </div>
        <div class="day">
            <div class="date">周二</div>
            <div class="weather-icon">⛅</div>
            <div>24°C / 17°C</div>
        </div>
        <div class="day">
            <div class="date">周三</div>
            <div class="weather-icon">🌧️</div>
            <div>22°C / 16°C</div>
        </div>
        <div class="day">
            <div class="date">周四</div>
            <div class="weather-icon">🌦️</div>
            <div>23°C / 15°C</div>
        </div>
        <div class="day">
            <div class="date">周五</div>
            <div class="weather-icon">☁️</div>
            <div>21°C / 14°C</div>
        </div>
    </div>
</div>

</body>
</html>
